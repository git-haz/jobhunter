services:
  - type: web
    name: jobhunter
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
