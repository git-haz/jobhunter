platform: personio
jobs_list:
  path: /
  container: "li"
  link_selector: "a[href*='/job/']"
  fields:
    title:
      selector: "h3"
      attribute: "text"
    meta:
      selector: "span"
      attribute: "text"
    url:
      selector: "a"
      attribute: "href"
job_detail:
  fields:
    title:
      selector: "h1"
      attribute: "text"
    description:
      selector: "div"
      attribute: "text"
